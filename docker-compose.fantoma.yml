services:
  fantoma:
    build: .
    container_name: fantoma-browser
    restart: unless-stopped
    ports:
      - "7860:7860"
      - "6080:6080"   # noVNC — manual intervention hatch
    environment:
      # Local LLM (Hercules on host)
      - LOCAL_LLM_URL=http://host.docker.internal:8081/v1
      # Backup LLM (Hermes on host)
      - BACKUP_LLM_URL=http://host.docker.internal:8082/v1
      # Cloud LLM backup (OpenRouter — Qwen 3.6 Plus)
      - CLOUD_LLM_URL=https://openrouter.ai/api/v1
      - CLOUD_LLM_KEY=${OPENROUTER_KEY}
      - CLOUD_LLM_MODEL=qwen/qwen3.6-plus
      # CAPTCHA solving
      - CAPTCHA_API=capsolver
      - CAPTCHA_KEY=${CAPSOLVER_KEY}
      # Proxy (optional — uncomment to route through gluetun or residential proxy)
      # - FANTOMA_PROXY=http://host.docker.internal:8888
      # Display: "virtual" = Xvfb inside container
      - FANTOMA_HEADLESS=virtual
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persistent browser profiles (sessions survive restarts)
      - fantoma-profiles:/root/.local/share/fantoma
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Shared memory for browser (Firefox needs >64MB default)
    shm_size: 512m

volumes:
  fantoma-profiles:
